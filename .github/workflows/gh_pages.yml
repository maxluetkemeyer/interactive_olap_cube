name: Build and Deploy Vite React App to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24 # Uses a stable Node LTS version
          cache: 'npm'

      - name: Install dependencies
        # 'npm ci' is recommended in CI environments as it strictly installs from package-lock.json
        # If you don't commit your package-lock.json, change this to 'npm install'
        run: npm ci

      # Optional: Uncomment if you have a test script in your package.json
      # - name: Run tests
      #   run: npm run test

      - name: Build Vite App
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite outputs the production build to the 'dist' folder by default
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4